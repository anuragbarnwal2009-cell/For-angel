<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for Angel</title>
    <style>
        body { 
            background-color: #fff5f5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden;
        }
        
        #egg-container { 
            cursor: pointer; 
            text-align: center; 
            transition: transform 0.1s; 
            user-select: none;
        }
        
        #egg { 
            font-size: 100px; 
            transition: 0.3s; 
        }
        
        #counter { 
            font-size: 1.4rem; 
            color: #d63031; 
            margin-top: 15px; 
            font-weight: bold; 
        }

        #secret-content { 
            display: none; 
            text-align: center; 
            animation: fadeIn 1.2s ease-in-out; 
            padding: 20px;
        }

        img { 
            max-width: 85%; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(214, 48, 49, 0.2); 
            margin-bottom: 20px; 
            border: 4px solid white;
        }

        h1 { color: #d63031; font-size: 2rem; margin-bottom: 10px; }
        p { color: #636e72; font-size: 1.1rem; line-height: 1.5; }

        /* Animation for the shake effect */
        .shake { animation: shake 0.15s; }
        @keyframes shake {
            0% { transform: scale(1) rotate(0); }
            25% { transform: scale(1.1) rotate(5deg); }
            50% { transform: scale(1.1) rotate(-5deg); }
            75% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div id="egg-container" onclick="handleTap()">
        <div id="egg">🥚</div>
        <div id="counter">Taps left: <span id="clicks">50</span></div>
        <p style="color: #b2bec3;">Something is inside...</p>
    </div>

    <div id="secret-content">
        <img src="myphoto.jpg" alt="My Sorry Photo">
        <h1>I am so sorry, Angel.</h1>
        <p>I know I messed up, but I really value you.<br>Thanks for tapping through to see this.</p>
    </div>

    <script>
        let count = 50;
        const egg = document.getElementById('egg');
        const clicksText = document.getElementById('clicks');
        const container = document.getElementById('egg-container');
        const secret = document.getElementById('secret-content');

        function handleTap() {
            count--;
            clicksText.innerText = count;

            // Add shake effect on every tap
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 150);

            // Change egg appearance as it "cracks"
            if (count === 35) egg.innerText = "🥚"; 
            if (count === 20) egg.innerText = "🐣";
            if (count === 5) egg.innerText = "🐥";

            if (count <= 0) {
                container.style.display = 'none';
                secret.style.display = 'block';
            }
        }
    </script>
</body>
</html>

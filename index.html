<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Angel</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0d0d0d; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        #landing-screen { text-align: center; transition: opacity 1s; }

        .open-btn { 
            padding: 15px 40px; 
            font-size: 1.5rem; 
            background: #ff7675; 
            border: none; 
            border-radius: 50px; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 0 20px rgba(255, 118, 117, 0.4); 
        }

        #main-content { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
            opacity: 0; 
            transition: opacity 2s ease; 
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #ff7675; margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.6; max-width: 500px; opacity: 0.9; }
        .signature { margin-top: 15px; font-style: italic; opacity: 0.7; }

        #egg-section { margin-top: 30px; display: none; }
        #egg { font-size: 90px; cursor: pointer; user-select: none; transition: transform 0.1s; display: inline-block; }
        #counter { color: #ff7675; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }

        #final-surprise { display: none; animation: fadeIn 1.5s ease-out; z-index: 10; }
        #final-surprise img { 
            max-width: 85%; 
            border-radius: 15px; 
            border: 5px solid white; 
            margin-top: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
        }

        .cutu-msg { 
            font-family: 'Dancing Script', cursive; 
            color: #ff7675; 
            font-size: 2.2rem; 
            margin-top: 15px; 
            text-shadow: 0 0 10px rgba(255, 118, 117, 0.3);
        }

        /* Heart Animation Styles */
        .heart {
            position: fixed;
            bottom: -20px;
            font-size: 24px;
            color: #ff7675;
            user-select: none;
            pointer-events: none;
            z-index: 1000;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) translateX(40px) rotate(45deg); opacity: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .shake { animation: shake 0.2s; }
        @keyframes shake { 
            0% { transform: rotate(0); } 
            25% { transform: rotate(7deg); } 
            50% { transform: rotate(-7deg); } 
            100% { transform: rotate(0); } 
        }
    </style>
</head>
<body>

    <div id="landing-screen">
        <button class="open-btn" onclick="revealPage()">Open</button>
    </div>

    <div id="main-content">
        <h1>Im so sorry Angel</h1>
        <p>Anurag don't mean that.<br>I'm really sorry.</p>
        <p>Apne bestfriend se aise hi muh phula ke baithe rahogi?... Use maaf nhi krogi?</p>
        <p>maaf krde pleaseeeeeeeeeeeeee 👍👈</p>
        <div class="signature">- Anurag</div>

        <audio id="apologyVoice">
            <source src="voice.mp3" type="audio/mpeg">
        </audio>

        <div id="trigger-wrapper" style="margin-top: 25px;">
            <button onclick="showEgg()" style="padding: 12px 25px; background: #ff7675; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;">
                Click for a surprise 🎁
            </button>
        </div>

        <div id="egg-section">
            <div id="egg" onclick="handleEggTap()">🥚</div>
            <p id="counter">Taps left: <span id="clicks">50</span></p>
            
            <div id="final-surprise">
                <img src="myphoto.jpg" alt="Sorry Photo">
                <div class="cutu-msg">Aapka cutu Anurag hihihi 🤭🤭</div>
            </div>
        </div>
    </div>

    <script>
        function revealPage() {
            var audio = document.getElementById('apologyVoice');
            audio.play().catch(function(error) { console.log("Audio play blocked"); });

            const landing = document.getElementById('landing-screen');
            const main = document.getElementById('main-content');
            
            landing.style.opacity = "0";
            setTimeout(() => {
                landing.style.display = "none";
                main.style.display = "flex";
                setTimeout(() => { main.style.opacity = "1"; }, 50);
            }, 1000);
        }

        function showEgg() {
            document.getElementById('trigger-wrapper').style.display = 'none';
            document.getElementById('egg-section').style.display = 'block';
        }

        function startHearts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }, i * 200);
            }
        }

        let tapCount = 50;
        function handleEggTap() {
            tapCount--;
            document.getElementById('clicks').innerText = tapCount;
            
            const egg = document.getElementById('egg');
            egg.classList.add('shake');
            setTimeout(() => egg.classList.remove('shake'), 200);

            if (tapCount === 25) egg.innerText = "🐣";
            if (tapCount === 10) egg.innerText = "🐥";
            
            if (tapCount <= 0) {
                egg.style.display = 'none';
                document.getElementById('counter').style.display = 'none';
                document.getElementById('final-surprise').style.display = 'block';
                startHearts(); // Hearts trigger right here!
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Angel</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #landing-screen { text-align: center; transition: opacity 1s; }
        .open-btn { padding: 15px 40px; font-size: 1.5rem; background: #ff7675; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 0 20px rgba(255, 118, 117, 0.4); }
        
        #main-content { display: none; flex-direction: column; align-items: center; text-align: center; padding: 20px; opacity: 0; transition: opacity 2s ease; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #ff7675; }
        p { font-size: 1.1rem; line-height: 1.6; max-width: 500px; opacity: 0.9; }
        
        #egg-section { margin-top: 20px; display: none; }
        #egg { font-size: 80px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        #counter { color: #ff7675; font-weight: bold; margin-top: 10px; }
        
        #final-surprise { display: none; animation: fadeIn 1.5s; }
        #final-surprise img { max-width: 80%; border-radius: 20px; border: 4px solid white; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="landing-screen">
        <button class="open-btn" onclick="revealPage()">Open</button>
    </div>

    <div id="main-content">
        <h1>Im so sorry Angel</h1>
        <p>Anurag don't mean that.<br>I'm really sorry.</p>
        <p>Apne bestfriend se aise hi muh phula ke baithe rahogi?... Use maaf nhi krogi?</p>
        <p>maaf krde pleaseeeeeeeeeeeeee 👍👈</p>
        <div style="margin-top: 10px; opacity: 0.7;">- Anurag</div>

        <audio id="apologyVoice">
            <source src="voice.mp3" type="audio/mpeg">
        </audio>

        <div id="trigger-wrapper" style="margin-top: 25px;">
            <button onclick="showEgg()" style="padding: 12px 25px; background: #ff7675; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;">
                Click for a surprise 🎁
            </button>
        </div>

        <div id="egg-section">
            <div id="egg" onclick="handleEggTap()">🥚</div>
            <p id="counter">Taps left: <span id="clicks">50</span></p>
            
            <div id="final-surprise">
                <img src="myphoto.jpg" alt="Sorry Photo">
                <h2 style="color: #ff7675;">I'm truly sorry.</h2>
            </div>
        </div>
    </div>

    <script>
        function revealPage() {
            document.getElementById('apologyVoice').play();
            const landing = document.getElementById('landing-screen');
            const main = document.getElementById('main-content');
            
            landing.style.opacity = "0";
            setTimeout(() => {
                landing.style.display = "none";
                main.style.display = "flex";
                setTimeout(() => { main.style.opacity = "1"; }, 50);
            }, 1000);
        }

        function showEgg() {
            document.getElementById('trigger-wrapper').style.display = 'none';
            document.getElementById('egg-section').style.display = 'block';
        }

        let tapCount = 50;
        function handleEggTap() {
            tapCount--;
            document.getElementById('clicks').innerText = tapCount;
            
            const egg = document.getElementById('egg');
            egg.classList.add('shake');
            setTimeout(() => egg.classList.remove('shake'), 200);

            if (tapCount === 25) egg.innerText = "🐣";
            if (tapCount === 10) egg.innerText = "🐥";
            
            if (tapCount <= 0) {
                egg.style.display = 'none';
                document.getElementById('counter').style.display = 'none';
                document.getElementById('final-surprise').style.display = 'block';
            }
        }
    </script>
</body>
</html>

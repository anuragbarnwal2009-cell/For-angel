<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Angel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;500&display=swap');

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #1a1a1a; /* Fixes the white blank screen while loading */
        }

        /* Beautiful Background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=2576&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.5); 
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: white;
            padding: 20px;
            cursor: pointer; /* Tells her she can tap here */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 600px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .tap-hint {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-top: 10px;
        }

        .signature {
            font-size: 1rem;
            margin-top: 20px;
            opacity: 0.8;
            font-style: italic;
        }

        /* Hidden Audio */
        audio { display: none; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body onclick="playAudio()">

    <div class="background"></div>

    <div class="container">
        <h1>Im so sorry Angel</h1>
        <p>Anurag don't mean that.<br>I'm really sorry.</p>
        <p class="tap-hint">(Tap anywhere to listen)</p>
        
        <div class="signature">- Anurag</div>

        <audio id="apologyVoice">
            <source src="voice.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function playAudio() {
            var audio = document.getElementById("apologyVoice");
            audio.play();
            // Optional: Hide the "tap to listen" hint after clicking
            document.querySelector('.tap-hint').style.display = 'none';
        }
    </script>
</body>
</html>

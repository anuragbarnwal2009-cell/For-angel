<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Angel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;500&display=swap');

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #0d0d0d;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=2576&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            z-index: -1;
        }

        /* Initial Landing Screen */
        #landing-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #0d0d0d;
            position: absolute;
            width: 100%;
            z-index: 10;
            transition: opacity 1s ease;
        }

        .open-btn {
            padding: 15px 40px;
            background: none;
            border: 1px solid #c4a484;
            color: #c4a484;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .open-btn:active { background: #c4a484; color: #0d0d0d; }

        /* Final Content Screen */
        .container {
            display: none; /* Hidden at first */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: white;
            padding: 20px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; line-height: 1.6; max-width: 600px; opacity: 0.9; }
        .signature { font-size: 1rem; margin-top: 20px; opacity: 0.7; font-style: italic; }

        @media (max-width: 600px) { h1 { font-size: 2.8rem; } }
    </style>
</head>
<body>

    <div id="landing-screen">
        <button class="open-btn" onclick="revealPage()">Open</button>
    </div>

    <div class="background"></div>

    <div class="container" id="main-content">
        <h1>Im so sorry Angel</h1>
        <p>Anurag don't mean that.<br>I'm really sorry.</p>
        <p>Apne bestfriend se aise hi muh phula ke baithe rahogi?...Use maaf nhi karogi?</p>
        <p>maaf krde pleaseeeeeeeeeeeeee 👉👈</p>
        <div class="signature">- Anurag</div>

        <audio id="apologyVoice">
            <source src="voice.mp3" type="audio/mpeg">
              <audio id="apologyVoice">
          <source src="voice.mp3" type="audio/mpeg">
      </audio>

      <br><br>
      <a href="photo.html" style="display: inline-block; padding: 12px 25px; background-color: #ff7675; color: white; border-radius: 30px; text-decoration: none; font-weight: bold; font-family: sans-serif;">
          Click for a surprise 🎁
      </a>
      </div> ```

    <script>
        function revealPage() {
            // Play Audio
            var audio = document.getElementById("apologyVoice");
            audio.play();

            // Hide Landing Screen
            var landing = document.getElementById("landing-screen");
            landing.style.opacity = "0";
            
            setTimeout(() => {
                landing.style.display = "none";
                // Show Main Content
                var content = document.getElementById("main-content");
                content.style.display = "flex";
                setTimeout(() => { content.style.opacity = "1"; }, 50);
            }, 1000);
        }
    </script>
</body>
</html>
